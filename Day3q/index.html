<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task 2: Flexbox and Grid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Flexbox: navbar -->
    <header class="site-header">
      <nav class="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Grid: photo gallery -->
    <main class="content">
      <section class="gallery-wrap">
        <h2>Gallery</h2>
        <div class="gallery">
          <div class="photo">1</div>
          <div class="photo">2</div>
          <div class="photo">3</div>
          <div class="photo">4</div>
          <div class="photo">5</div>
          <div class="photo">6</div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Made for the CSS class — Flexbox &amp; Grid practice</p>
    </footer>
  </body>
</html>
